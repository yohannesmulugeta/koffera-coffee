const home=()=>`<main><section class="hero"><div class="wrap herogrid"><div><span class="eyelight">Authentic Ethiopian coffee</span><h1>Ethiopia’s coffee heritage, prepared for the world.</h1><p>Koffera connects international buyers with Ethiopian coffee through a warmer brand identity, clearer product presentation and a professional export enquiry journey.</p><div class="actions">${btn("Explore our coffee","coffees","cream")}${btn("Request an offer","request-offer","outline")}</div><div class="facts"><span>✓ Ethiopian Arabica</span><span>✓ B2B export focus</span><span>✓ Buyer enquiry ready</span></div></div><div class="packscene"><div class="pack"><div class="pack-top"></div><div class="pack-label"><h3>KOFFERA</h3><hr><small>PREMIUM ETHIOPIA</small><b>100% ARABICA COFFEE</b><span>CREATED WITH CARE FOR YOU</span></div><div class="pack-bottom"></div></div></div></div></section><section class="proof"><div class="wrap proofgrid"><div><i>◆</i><span><b>Origin-led</b>Ethiopian sourcing story</span></div><div><i>●</i><span><b>Buyer-ready</b>Coffee presentation</span></div><div><i>✓</i><span><b>Professional</b>Export information</span></div><div><i>↗</i><span><b>International</b>Partnership focus</span></div></div></section><section class="section"><div class="wrap intro"><div class="story"><span>FROM ETHIOPIA</span><b>Born at origin.<br>Built for buyers.</b></div><div>${title("The Koffera story","A warmer, more authentic coffee-export identity.","The website uses Koffera’s coffee-brown, cream and white identity while giving buyers clear access to products, origins, quality and export information.")}<div class="lines"><p><b>01</b><span><strong>Authentic positioning</strong> Ethiopian identity through product and origin.</span></p><p><b>02</b><span><strong>Commercial clarity</strong> Products, services and enquiries are easy to find.</span></p><p><b>03</b><span><strong>Premium restraint</strong> Better spacing, typography and visual rhythm.</span></p></div><a class="textlink" href="#/about">Discover Koffera →</a></div></div></section><section class="section creamsec"><div class="wrap">${title("Our coffee","Ethiopian coffees presented with character.","Illustrative demo records prepared for verified Koffera products, grades, crop years and availability.",false,true)}<div class="cards">${coffees.slice(0,3).map(card).join("")}</div><div class="centerbtn">${btn("View the catalogue","coffees")}</div></div></section><section class="section darksec"><div class="wrap">${title("Export services","A clearer path from discovery to shipment.","Services are presented around what international buyers need before beginning a transaction.",true)}<div class="services">${[["01","Coffee sourcing","Match buyer requirements with confirmed origins, grades and availability."],["02","Quality coordination","Coordinate representative samples and agreed quality information."],["03","Export documentation","Prepare transaction and shipment documents required by the agreement."],["04","Shipment support","Confirm packaging, loading and buyer communication."]].map(x=>`<article><span>${x[0]}</span><h3>${x[1]}</h3><p>${x[2]}</p></article>`).join("")}</div></div></section><section class="section founder"><div class="wrap twocol">${media("Founder portrait",true)}<div>${title("Founder & company","Leadership supports the coffee story—not the other way around.","The founder remains visible as part of Koffera’s credibility while products, sourcing and buyer needs remain central.")}<blockquote>“Our final message will focus on Ethiopian coffee quality, trusted relationships and dependable export execution.”</blockquote><p><b>${company.founder}</b><br><small>Founder — final biography required</small></p><a class="textlink" href="#/about">Read the company story →</a></div></div></section>${cta()}</main>`;
const coffeesPage=()=>`<main>${pageHero("Our coffee","Ethiopian coffees with a clearer buyer story.","Explore illustrative coffee records prepared for Koffera’s future verified origins, grades, crop years and availability.",btn("Explore origins","origins","cream")+btn("Request current offer","request-offer","outline"))}<section class="section creamsec"><div class="wrap"><div class="catalogue"><span>Demo catalogue — replace with approved Koffera lot data.</span><div><button>Origin</button><button>Process</button><button>Availability</button></div></div><div class="cards cataloguecards">${coffees.map(card).join("")}</div></div></section>${cta("Need a current coffee offer?","Send your preferred origin, grade, process, quantity and destination.")}</main>`;
const coffeeDetail=slug=>{const c=coffees.find(x=>x.slug===slug);if(!c)return notFound();const specs=[["Region",c.region],["Process",c.process],["Grade",c.grade],["Crop year",c.crop],["Altitude",c.altitude],["Variety",c.variety],["Availability",c.availability],["Packaging",c.packaging]];return `<main><section class="producthero"><div class="wrap productgrid"><div><span class="eyelight">Illustrative coffee record</span><h1>${esc(c.name)}</h1><p>${esc(c.text)}</p><div class="actions">${btn("Request this coffee","request-offer","cream")}${btn("Back to catalogue","coffees","outline")}</div></div><div class="productvisual ${c.tone}"><span>${esc(c.process)}</span><strong>${esc(c.region)}</strong><small>Final product image required</small></div></div></section><section class="section"><div class="wrap detail-layout"><div>${title("Product overview","Structured for professional coffee evaluation.","The values below are illustrative demo data and must be replaced with approved lot specifications.")}<div class="specgrid">${specs.map(([a,b])=>`<div><span>${esc(a)}</span><b>${esc(b)}</b></div>`).join("")}</div></div><aside class="samplebox"><span>DEMO CUP PROFILE</span><h3>${esc(c.cup)}</h3><hr><span>Moisture</span><b>${esc(c.moisture)}</b><span>Screen size</span><b>${esc(c.screen)}</b><span>Certification</span><b>${esc(c.certification)}</b></aside></div></section>${cta(`Interested in ${c.name}?`,`Tell Koffera your required grade, quantity, packaging and destination.`)}</main>`};
const origins=()=>`<main>${pageHero("Coffee origins","A clearer view of Ethiopian coffee regions.","This page is prepared for Koffera’s confirmed sourcing regions, suppliers, processing methods and current coffees.",btn("View coffee catalogue","coffees","cream"))}<section class="section"><div class="wrap origin-layout"><div class="ethiopia-map"><h2>Ethiopia origin map</h2><p>Replace with an approved sourcing-region map.</p></div><div>${title("Origin-led sourcing","Connect each coffee to a meaningful regional story.","The final version should show only regions where Koffera can confirm sourcing, supplier relationships and coffee availability.")}<div class="lines"><p><b>✓</b><span>Confirm active sourcing regions</span></p><p><b>✓</b><span>Add supplier or washing-station information</span></p><p><b>✓</b><span>Add real origin and processing photography</span></p></div></div></div></section><section class="section creamsec"><div class="wrap">${title("Featured origins","Prepared for verified Koffera sourcing data.","The descriptions below are general orientation, not confirmed inventory.",false,true)}<div class="origin-grid">${[["Yirgacheffe","Known for refined washed and natural profiles."],["Guji","Associated with expressive natural and washed coffees."],["Sidama","A diverse area with varied elevation and cup profiles."],["Limu","Often presented as clean and balanced washed coffee."],["Jimma","Relevant to commercial and specialty discussions."]].map(x=>`<article><div class="origin-visual"></div><div><h3>${x[0]}</h3><p>${x[1]} Confirm Koffera’s active sourcing before publication.</p><a class="textlink" href="#/request-offer">Ask about this origin →</a></div></article>`).join("")}</div></div></section>${cta("Looking for a specific Ethiopian origin?","Tell Koffera the region, process, grade and volume you need.")}</main>`;
const quality=()=>`<main>${pageHero("Quality & traceability","Show buyers how coffee moves from origin to shipment.","A proposed workflow prepared for Koffera’s verified quality-control and traceability procedure.",btn("Request quality information","request-offer","cream"))}<section class="section"><div class="wrap quality-intro"><div>${title("Proposed quality flow","Evidence should replace unsupported quality claims.","The final page should combine the real process, records, photographs and certificates.")}</div>${media("Quality and cupping video")}</div></section><section class="section creamsec"><div class="wrap"><div class="timeline">${[["01","Buyer requirement review","Record origin, grade, process, volume and destination."],["02","Lot identification","Match the enquiry to an available lot."],["03","Sample evaluation","Prepare a representative sample and cup observations."],["04","Buyer approval","Dispatch the sample and collect feedback."],["05","Pre-shipment confirmation","Complete agreed checks and documents."],["06","Shipment follow-up","Share loading updates and shipping documents."]].map(x=>`<article><span>${x[0]}</span><div><h3>${x[1]}</h3><p>${x[2]}</p></div></article>`).join("")}</div></div></section><section class="section"><div class="wrap proof-panels"><article><h3>Traceability example</h3><p>Contract → lot → supplier → origin → process → quality record → shipment.</p></article><article><h3>Certificates and evidence</h3><p>Add active certificates and expiry dates only after verification.</p></article><article><h3>Buyer sample workflow</h3><p>Explain sample preparation, dispatch, approval and contract linkage.</p></article></div></section>${cta("Need quality documentation?","Describe the coffee and evidence your team requires.")}</main>`;
const services=()=>`<main>${pageHero("Export services","A professional path from buyer enquiry to shipment.","Koffera’s service structure is organised around the questions international buyers need answered.",btn("Start an export enquiry","request-offer","cream"))}<section class="section"><div class="wrap">${title("Service areas","Clear responsibilities at every commercial stage.","Final descriptions must match Koffera’s actual capabilities.",false,true)}<div class="service-detail-grid">${[["01","Coffee sourcing","Match requirements with confirmed origins and availability."],["02","Offer and sampling","Prepare the commercial offer and coordinate samples."],["03","Documentation","Confirm commercial and shipment documents."],["04","Packaging preparation","Confirm bag type and markings."],["05","Inland coordination","Present actual handling responsibilities."],["06","Shipment communication","Keep the buyer informed about loading and documents."]].map(x=>`<article><span>${x[0]}</span><h3>${x[1]}</h3><p>${x[2]}</p></article>`).join("")}</div></div></section><section class="section darksec"><div class="wrap export-path"><div>${title("Buyer journey","One connected export conversation.","The website makes the next action clear without promising unverified services.",true)}${btn("Request export information","request-offer","cream")}</div><div class="path-list">${["Share requirements","Review possible coffee","Approve samples","Confirm terms","Prepare documents","Coordinate shipment"].map((x,i)=>`<p><span>${String(i+1).padStart(2,"0")}</span>${x}</p>`).join("")}</div></div></section>${cta("Planning an Ethiopian coffee purchase?","Send the information needed for a useful response.")}</main>`;
const markets=()=>`<main>${pageHero("Target markets","Built around different professional coffee buyers.","Each buyer group receives the information relevant to its purchasing process.",btn("Discuss requirements","request-offer","cream"))}<section class="section"><div class="wrap">${title("Who Koffera serves","A useful message for every buyer type.","Final copy should reflect actual customers without unverified names.",false,true)}<div class="segment-grid">${[["01","Specialty roasters","Origin, process, cup profile and samples."],["02","Importers & distributors","Offers, documentation and shipment coordination."],["03","Private-label brands","Coffee selection and packaging discussions."],["04","Cafés & hospitality","Supply conversations for cafés and hotels."],["05","Retail coffee companies","Product and supply planning."],["06","Responsible sourcing partners","Traceability supported by real records."]].map(x=>`<article><span>${x[0]}</span><h3>${x[1]}</h3><p>${x[2]}</p><a class="textlink" href="#/request-offer">Start an enquiry →</a></article>`).join("")}</div></div></section>${cta("Which market are you buying for?","Describe your business and coffee requirement.")}</main>`;
const about=()=>`<main>${pageHero("About Koffera","Rooted in Ethiopia. Designed for lasting coffee partnerships.","A focused company story balancing heritage, leadership and commercial credibility.")}<section class="section"><div class="wrap twocol">${media("Company or founder image",true)}<div>${title("Our company","A concise story with stronger business relevance.","Koffera is presented as an Ethiopian coffee-export brand serving professional buyers.")}<p>The final page should explain sourcing, quality, supplier relationships and export execution using verified facts.</p>${btn("Contact Koffera","contact")}</div></div></section><section class="section creamsec"><div class="wrap two-panels"><article><span class="eye">VISION</span><h2>Represent Ethiopian coffee with integrity internationally.</h2><p>Final wording requires approval.</p></article><article><span class="eye">MISSION</span><h2>Connect buyers with coffee and dependable export support.</h2><p>Final wording must match operations.</p></article></div></section></main>`;
const offerForm=()=>`<form class="offer-form" id="offerForm"><span class="eye">COFFEE REQUIREMENTS</span><h2>Commercial enquiry</h2><div class="formgrid"><label>Full name<input required></label><label>Company<input required></label><label>Business email<input required type="email"></label><label>Country<input required></label><label>Buyer type<select required><option value="">Select</option><option>Specialty roaster</option><option>Importer / distributor</option><option>Private-label brand</option></select></label><label>Expected purchase date<input type="month"></label><label>Preferred origin<select><option>Any available origin</option><option>Yirgacheffe</option><option>Guji</option><option>Sidama</option></select></label><label>Processing method<select><option>Any process</option><option>Washed</option><option>Natural</option></select></label><label>Grade requirement<input></label><label>Estimated quantity<input required></label><label>Packaging preference<input></label><label>Destination port<input></label><label class="full">Additional message<textarea rows="6" required></textarea></label><button class="btn dark full" type="submit">Submit request →</button></div></form>`;
const requestOffer=()=>`<main>${pageHero("Request an offer","Give Koffera the information needed for a useful coffee offer.","This demo form validates in the browser. Email delivery can be connected later.")}<section class="section creamsec"><div class="wrap offer-layout"><aside><span class="eye">BEFORE YOU SUBMIT</span><h2>Prepare your purchasing requirements.</h2><p>A complete request helps the export team respond accurately.</p><p>✓ Preferred origin</p><p>✓ Grade and process</p><p>✓ Required quantity</p><p>✓ Destination port</p><div class="demo-note"><b>Demo:</b> submission is not emailed yet.</div></aside>${offerForm()}</div></section></main>`;
const contact=()=>`<main>${pageHero("Contact","Contact Koffera or send a general message.","For pricing and samples, use Request an Offer.",btn("Request an offer","request-offer","cream"))}<section class="section creamsec"><div class="wrap contact"><aside><span class="eye">DIRECT CONTACT</span><h2>Let’s start with the right information.</h2><a href="mailto:${company.email}"><span>Email<b>${company.email}</b></span></a><a href="tel:${company.phone.replace(/\s/g,"")}"><span>Phone<b>${company.phone}</b></span></a><div><span>Office<b>${company.location}</b></span></div><div class="map">Office map or facility image</div></aside><form id="contactForm"><span class="eye">GENERAL MESSAGE</span><h2>Contact form</h2><div class="formgrid"><label>Full name<input required></label><label>Company<input></label><label>Email<input required type="email"></label><label>Country<input></label><label class="full">Subject<input required></label><label class="full">Message<textarea rows="7" required></textarea></label><button class="btn dark full" type="submit">Send message →</button></div></form></div></section></main>`;
const legal=t=>`<main class="legal"><div class="wrap"><span class="eye">LEGAL PLACEHOLDER</span><h1>${esc(t)}</h1><p>This page requires approved legal content before launch.</p><a class="textlink" href="#/">Return home →</a></div></main>`;const notFound=()=>`<main class="legal"><div class="wrap"><span class="eye">404</span><h1>Page not found</h1>${btn("Return home","")}</div></main>`;
function view(){const p=route();if(!p.length)return home();if(p[0]==="coffees")return p[1]?coffeeDetail(p[1]):coffeesPage();if(p[0]==="origins")return origins();if(p[0]==="quality-traceability")return quality();if(p[0]==="export-services")return services();if(p[0]==="markets")return markets();if(p[0]==="request-offer")return requestOffer();if(p[0]==="about")return about();if(p[0]==="contact")return contact();if(p[0]==="privacy")return legal("Privacy Policy");if(p[0]==="terms")return legal("Terms & Conditions");return notFound()}
function bind(){const m=document.getElementById("menu"),n=document.getElementById("nav");if(m&&n)m.onclick=()=>n.classList.toggle("open");document.querySelectorAll(".navgroup>button").forEach(b=>b.onclick=()=>b.parentElement.classList.toggle("open"));document.querySelectorAll("#nav a").forEach(a=>a.onclick=()=>n&&n.classList.remove("open"));["offerForm","contactForm"].forEach(id=>{const f=document.getElementById(id);if(f)f.onsubmit=e=>{e.preventDefault();alert("Demo form submitted successfully. Email delivery will be connected later.");f.reset()}})}function render(){try{document.getElementById("app").innerHTML=header()+view()+footer();bind();scrollTo(0,0)}catch(err){console.error(err);document.getElementById("app").innerHTML=`<div class="errorbox"><div><span class="eye">WEBSITE ERROR</span><h1>This page could not load.</h1><p>${esc(err.message||err)}</p><button class="btn dark" onclick="location.reload()">Refresh</button></div></div>`}}window.addEventListener("hashchange",render);window.addEventListener("DOMContentLoaded",render);if(document.readyState!=="loading")render();
})();
</script>
