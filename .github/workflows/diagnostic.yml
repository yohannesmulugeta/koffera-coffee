name: Responsive diagnostic

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/diagnostic.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
      - name: Install dependencies
        run: npm ci --no-audit --no-fund
      - name: Lint
        run: npm run lint
      - name: Build
        run: npm run build
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Run tests and prepare report
        id: tests
        continue-on-error: true
        shell: bash
        run: |
          set +e
          npm run test:e2e > /tmp/test.log 2>&1
          STATUS=$?
          mkdir -p docs
          {
            echo '# Responsive Diagnostic Report'
            echo
            echo "- Source commit: $GITHUB_SHA"
            echo "- Exit code: $STATUS"
            echo "- Result: $([ $STATUS -eq 0 ] && echo PASS || echo FAIL)"
            echo
            echo '```text'
            tail -n 220 /tmp/test.log
            echo '```'
          } > docs/RESPONSIVE_STATUS.md
          exit 0
      - name: Commit report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/RESPONSIVE_STATUS.md
          git diff --cached --quiet || git commit -m "Add responsive diagnostic report"
          git push
