name: Repository diagnostic

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/diagnostic.yml
      - tests/**
      - src/**
      - package.json
      - package-lock.json
      - vite.config.js
      - playwright.config.js
  workflow_dispatch:

permissions:
  contents: write

jobs:
  diagnose:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Run diagnostic checks
        shell: bash
        run: |
          set +e
          npm ci --no-audit --no-fund > /tmp/install.log 2>&1
          INSTALL_STATUS=$?

          if [ "$INSTALL_STATUS" -eq 0 ]; then
            npm run lint > /tmp/lint.log 2>&1
            LINT_STATUS=$?
            npm run build > /tmp/build.log 2>&1
            BUILD_STATUS=$?
          else
            LINT_STATUS=99
            BUILD_STATUS=99
            echo "Skipped because npm ci failed." > /tmp/lint.log
            echo "Skipped because npm ci failed." > /tmp/build.log
          fi

          if [ "$BUILD_STATUS" -eq 0 ]; then
            npx playwright install --with-deps chromium > /tmp/playwright-install.log 2>&1
            PLAYWRIGHT_INSTALL_STATUS=$?
            if [ "$PLAYWRIGHT_INSTALL_STATUS" -eq 0 ]; then
              npm run test:e2e > /tmp/test.log 2>&1
              TEST_STATUS=$?
            else
              TEST_STATUS=98
              echo "Skipped because Playwright browser installation failed." > /tmp/test.log
            fi
          else
            PLAYWRIGHT_INSTALL_STATUS=99
            TEST_STATUS=99
            echo "Skipped because build failed." > /tmp/playwright-install.log
            echo "Skipped because build failed." > /tmp/test.log
          fi

          mkdir -p docs
          {
            echo "# CI Diagnostic Report"
            echo
            echo "Generated from commit: $GITHUB_SHA"
            echo
            echo "| Check | Exit code | Result |"
            echo "|---|---:|---|"
            echo "| npm ci | $INSTALL_STATUS | $([ $INSTALL_STATUS -eq 0 ] && echo PASS || echo FAIL) |"
            echo "| lint | $LINT_STATUS | $([ $LINT_STATUS -eq 0 ] && echo PASS || echo FAIL) |"
            echo "| build | $BUILD_STATUS | $([ $BUILD_STATUS -eq 0 ] && echo PASS || echo FAIL) |"
            echo "| Playwright install | $PLAYWRIGHT_INSTALL_STATUS | $([ $PLAYWRIGHT_INSTALL_STATUS -eq 0 ] && echo PASS || echo FAIL) |"
            echo "| route tests | $TEST_STATUS | $([ $TEST_STATUS -eq 0 ] && echo PASS || echo FAIL) |"
            echo
            for ITEM in install lint build playwright-install test; do
              echo "## $ITEM log"
              echo '```text'
              tail -n 120 "/tmp/$ITEM.log"
              echo '```'
              echo
            done
          } > docs/CI_STATUS.md

      - name: Commit diagnostic report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/CI_STATUS.md
          git diff --cached --quiet || git commit -m "Update CI diagnostic report"
          git push
