name: Capture Desktop Preview

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build production site
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Start Vite preview
        run: |
          npm run preview -- --host 127.0.0.1 --port 4173 > /tmp/koffera-preview.log 2>&1 &
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:4173/koffera-coffee/ > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          cat /tmp/koffera-preview.log
          exit 1

      - name: Capture all desktop scroll scenes
        run: node scripts/capture-desktop-preview.mjs

      - name: Upload desktop screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: koffera-desktop-preview
          path: artifacts/desktop-preview
          if-no-files-found: error
          retention-days: 7
