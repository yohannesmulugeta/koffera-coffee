name: Validate Pull Request

on:
  pull_request:
    branches: [main]

permissions:
  actions: write
  contents: read
  pull-requests: write

concurrency:
  group: validate-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Route, console, asset and responsive tests
        run: npm run test:e2e

      - name: Dispatch and locate production deployment
        if: startsWith(github.event.pull_request.title, '[deploy]')
        id: production
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          BEFORE_ID=$(gh run list \
            --repo "$GITHUB_REPOSITORY" \
            --workflow deploy.yml \
            --event workflow_dispatch \
            --branch main \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // 0')

          gh workflow run deploy.yml --ref main --repo "$GITHUB_REPOSITORY"

          RUN_ID=''
          for attempt in {1..20}; do
            CANDIDATE=$(gh run list \
              --repo "$GITHUB_REPOSITORY" \
              --workflow deploy.yml \
              --event workflow_dispatch \
              --branch main \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId // 0')

            if [ "$CANDIDATE" != "0" ] && [ "$CANDIDATE" != "$BEFORE_ID" ]; then
              RUN_ID="$CANDIDATE"
              break
            fi

            sleep 3
          done

          if [ -z "$RUN_ID" ]; then
            echo "Unable to locate the production deployment run."
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Production workflow run: $RUN_ID"

      - name: Report production workflow run
        if: startsWith(github.event.pull_request.title, '[deploy]')
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.production.outputs.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "Tracked GitHub Pages production workflow run: $RUN_ID"

      - name: Watch production deployment
        if: startsWith(github.event.pull_request.title, '[deploy]')
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.production.outputs.run_id }}
        run: gh run watch "$RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status

      - name: Verify editorial homepage is live
        if: startsWith(github.event.pull_request.title, '[deploy]')
        env:
          PAGE_URL: https://yohannesmulugeta.github.io/koffera-coffee/
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..18}; do
            if curl --fail --silent --show-error --location "$PAGE_URL" --output /tmp/live.html; then
              break
            fi

            if [ "$attempt" -eq 18 ]; then
              echo "The deployed homepage did not become available."
              exit 1
            fi

            sleep 10
          done

          grep -q '/koffera-coffee/assets/' /tmp/live.html
          ! grep -q '/src/main.jsx' /tmp/live.html

          node --input-type=module <<'NODE'
          import { chromium } from '@playwright/test';

          const browser = await chromium.launch({ headless: true });
          const page = await browser.newPage();
          const errors = [];
          page.on('console', (message) => {
            if (message.type() === 'error') errors.push(message.text());
          });
          page.on('pageerror', (error) => errors.push(error.message));

          await page.goto('https://yohannesmulugeta.github.io/koffera-coffee/', {
            waitUntil: 'networkidle',
          });
          await page.getByText('Ethiopian coffee, carried from origin to market with clarity.').waitFor({
            state: 'visible',
            timeout: 30000,
          });

          if (errors.length > 0) {
            throw new Error(`Live browser errors: ${errors.join(' | ')}`);
          }

          await browser.close();
          NODE
