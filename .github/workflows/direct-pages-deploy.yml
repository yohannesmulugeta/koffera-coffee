name: Direct Trusted Pages Deployment

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  actions: write
  contents: read
  pull-requests: write

concurrency:
  group: direct-koffera-pages
  cancel-in-progress: true

jobs:
  release:
    if: >-
      startsWith(github.event.pull_request.title, '[deploy]') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build trusted main
        run: npm run build

      - name: Dispatch production workflow on main
        id: dispatch
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          RESPONSE=$(gh api \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2026-03-10" \
            "/repos/${GITHUB_REPOSITORY}/actions/workflows/deploy.yml/dispatches" \
            -f ref=main)

          RUN_ID=$(printf '%s' "$RESPONSE" | jq -r '.workflow_run_id // empty')

          if [ -z "$RUN_ID" ]; then
            echo "The workflow dispatch response did not include a run ID."
            printf '%s\n' "$RESPONSE"
            exit 1
          fi

          echo "run_id=$RUN_ID" >> "$GITHUB_OUTPUT"
          echo "Dispatched production workflow run $RUN_ID on main."

      - name: Report production run ID
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr comment "$PR_NUMBER" --repo "$GITHUB_REPOSITORY" --body "Production deployment dispatched on trusted main. Workflow run ID: $RUN_ID"

      - name: Watch production deployment
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ID: ${{ steps.dispatch.outputs.run_id }}
        run: gh run watch "$RUN_ID" --repo "$GITHUB_REPOSITORY" --exit-status

      - name: Verify public homepage and compiled assets
        env:
          PAGE_URL: https://yohannesmulugeta.github.io/koffera-coffee/
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..18}; do
            if curl --fail --silent --show-error --location "$PAGE_URL" --output /tmp/live.html; then
              break
            fi

            if [ "$attempt" -eq 18 ]; then
              echo "The deployed homepage did not become available."
              exit 1
            fi

            sleep 10
          done

          grep -q '/koffera-coffee/assets/' /tmp/live.html
          ! grep -q '/src/main.jsx' /tmp/live.html

          ASSET_PATH=$(grep -oE '/koffera-coffee/assets/[^" ]+\.js' /tmp/live.html | head -n 1)
          test -n "$ASSET_PATH"
          curl --fail --silent --show-error --location "https://yohannesmulugeta.github.io${ASSET_PATH}" --output /tmp/app.js
          test -s /tmp/app.js

          grep -q 'Ethiopian coffee, carried from origin to market with clarity' /tmp/app.js
