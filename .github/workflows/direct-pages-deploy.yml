name: Direct Trusted Pages Deployment

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: direct-koffera-pages
  cancel-in-progress: true

jobs:
  build:
    if: >-
      startsWith(github.event.pull_request.title, '[deploy]') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: koffera-pages-production
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy trusted production artifact
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify public homepage and assets
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..18}; do
            if curl --fail --silent --show-error --location "$PAGE_URL" --output /tmp/live.html; then
              break
            fi

            if [ "$attempt" -eq 18 ]; then
              echo "The deployed homepage did not become available."
              exit 1
            fi

            sleep 10
          done

          grep -q '/koffera-coffee/assets/' /tmp/live.html
          ! grep -q '/src/main.jsx' /tmp/live.html

          ASSET_PATH=$(grep -oE '/koffera-coffee/assets/[^" ]+\.js' /tmp/live.html | head -n 1)
          test -n "$ASSET_PATH"
          curl --fail --silent --show-error --location "${PAGE_URL%/}${ASSET_PATH#/koffera-coffee}" --output /tmp/app.js
          test -s /tmp/app.js
