name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths-ignore:
      - docs/DEPLOYMENT_STATUS.md
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Route and browser smoke tests
        run: npm run test:e2e

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload dist artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live homepage and assets
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail
          for attempt in {1..12}; do
            if curl --fail --silent --show-error --location "$PAGE_URL" --output /tmp/live.html; then
              break
            fi
            if [ "$attempt" -eq 12 ]; then
              echo "The deployed homepage did not become available in time."
              exit 1
            fi
            sleep 10
          done

          grep -q '/koffera-coffee/assets/' /tmp/live.html
          if grep -q '/src/main.jsx' /tmp/live.html; then
            echo "Raw Vite source was found in the deployed HTML."
            exit 1
          fi

          curl --fail --silent --show-error --location "${PAGE_URL}favicon.svg" --output /tmp/favicon.svg
          grep -q '<svg' /tmp/favicon.svg

      - name: Checkout deployment branch state
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Record successful deployment verification
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          mkdir -p docs
          {
            echo '# Deployment Status'
            echo
            echo '- Result: PASS'
            echo "- Source commit: $GITHUB_SHA"
            echo "- Live URL: $PAGE_URL"
            echo "- Verified at: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
            echo '- Checks: live homepage, compiled asset paths, no raw /src/main.jsx reference, favicon availability'
          } > docs/DEPLOYMENT_STATUS.md

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/DEPLOYMENT_STATUS.md
          git diff --cached --quiet || git commit -m "Record verified GitHub Pages deployment"
          git push
