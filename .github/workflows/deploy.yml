name: Deploy to GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-production
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout trusted main
        uses: actions/checkout@v5
        with:
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload production artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify live homepage and compiled assets
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..18}; do
            if curl --fail --silent --show-error --location "$PAGE_URL" --output /tmp/live.html; then
              break
            fi

            if [ "$attempt" -eq 18 ]; then
              echo "The deployed homepage did not become available."
              exit 1
            fi

            sleep 10
          done

          grep -q '/koffera-coffee/assets/' /tmp/live.html

          if grep -q '/src/main.jsx' /tmp/live.html; then
            echo "Raw Vite source was found in the deployed HTML."
            exit 1
          fi

          ASSET_PATH=$(grep -oE '/koffera-coffee/assets/[^" ]+\.js' /tmp/live.html | head -n 1)
          test -n "$ASSET_PATH"
          curl --fail --silent --show-error --location "https://yohannesmulugeta.github.io${ASSET_PATH}" --output /tmp/app.js
          test -s /tmp/app.js

          curl --fail --silent --show-error --location "${PAGE_URL}favicon.svg" --output /tmp/favicon.svg
          grep -q '<svg' /tmp/favicon.svg

      - name: Publish deployment summary
        env:
          PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          {
            echo '## Koffera GitHub Pages deployment'
            echo
            echo "- Live URL: $PAGE_URL"
            echo '- Production build: passed'
            echo '- Pages deployment: passed'
            echo '- Homepage and compiled assets: verified'
          } >> "$GITHUB_STEP_SUMMARY"
